<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rizz · 권미나 프로토타입 (Home / 매칭 성공 / 데이트)</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    /* ────────────────────────────────────────────────
       Phone frame (393×852 — Rizz spec)
       ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--fg-1, #1a1a1a);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.25px;
      min-height: 100vh;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
      flex-wrap: wrap;
    }
    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      background: #ffffff;
      overflow: hidden;
      border-radius: 36px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.45);
    }
    .phone-label {
      position: absolute;
      top: -28px;
      left: 0;
      right: 0;
      text-align: center;
      color: #c9c9c9;
      font-size: 12px;
      letter-spacing: 0.2px;
    }

    /* ─── Status bar (9:41) ─── */
    .statusbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px 0 22px;
      font-family: 'SF Pro Text', -apple-system, sans-serif;
      font-weight: 600;
      font-size: 15.72px;
      color: #171717;
      letter-spacing: -0.314px;
      z-index: 50;
    }
    .statusbar.dark { color: #ffffff; }
    .statusbar .icons {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .statusbar svg { display: block; }

    /* ─── Top bar (Rizz logo + coin pill) ─── */
    .topbar {
      position: absolute;
      top: 46px;
      left: 0; right: 0;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 40;
    }
    .topbar .rizz-logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Pretendard Variable', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      background: linear-gradient(180deg, #FF3419 0%, #FF5E19 69%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .coin-pill {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px 2px 4px;
      border: 1px solid #efefef;
      border-radius: 999px;
      background: #fff;
      height: 22px;
      font-weight: 700;
      font-size: 11px;
      color: #1a1a1a;
      letter-spacing: -0.314px;
    }
    .coin-pill .coin {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #FFE48A 0%, #FFB23A 45%, #E58800 90%);
      box-shadow: inset 0 -2px 3px rgba(0,0,0,0.18), inset 0 1.5px 2px rgba(255,255,255,0.55);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #8a4a00;
      font-weight: 900;
      font-size: 10px;
      font-family: 'Inter', sans-serif;
    }

    /* ─── Bottom nav ─── */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid #ebebeb;
      padding: 8px 29px 28px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      z-index: 40;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      flex: 1;
      color: #8c8c8c;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: -0.0325px;
      user-select: none;
      background: none;
      border: 0;
      padding: 0;
      font-family: inherit;
    }
    .nav-item svg { width: 26px; height: 26px; stroke: #8c8c8c; }
    .nav-item.active { color: var(--color-primary-500, #FF5E19); }
    .nav-item.active svg { stroke: var(--color-primary-500, #FF5E19); }

    /* ─── Screen visibility ─── */
    .screen { position: absolute; inset: 0; }
    .screen[hidden] { display: none; }

    /* ────────────────────────────────────────────────
       SCREEN 1 — Home / TikTok-style vertical feed
       ──────────────────────────────────────────────── */
    .swipe-stack {
      position: absolute;
      top: 88px;
      left: 17px;
      right: 17px;
      bottom: 84px;
      overflow-y: scroll;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .swipe-stack::-webkit-scrollbar { display: none; }
    .swipe-stack { scrollbar-width: none; }
    .swipe-card {
      position: relative;
      width: 100%;
      height: 100%;
      flex-shrink: 0;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
    }
    .card-img {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }
    .card-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #111;
    }
    .card-shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.78) 100%);
      pointer-events: none;
    }

    .tag-row {
      position: absolute;
      top: 16px;
      right: 14px;
      display: flex;
      justify-content: flex-end;
      gap: 7px;
      z-index: 6;
    }
    .tag {
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      line-height: 1.4;
      letter-spacing: -0.045px;
      padding: 3px 9px;
      border-radius: 999px;
      backdrop-filter: blur(2px);
      white-space: nowrap;
    }

    .swipe-hint {
      position: absolute;
      top: 50%;
      left: 22px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      pointer-events: none;
      z-index: 5;
    }
    .swipe-hint .hand-pointer {
      width: 64px;
      height: auto;
      margin-left: 8px;
      transform: rotate(180deg); /* flip so finger points up */
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.45));
      animation: swipeUp 1.6s ease-in-out infinite;
    }
    @keyframes swipeUp {
      0%   { transform: rotate(180deg) translateY(18px); opacity: 0.55; }
      50%  { transform: rotate(180deg) translateY(-10px); opacity: 1; }
      100% { transform: rotate(180deg) translateY(18px); opacity: 0.55; }
    }
    .swipe-msg {
      background: #FC641A;
      border: 2.5px solid #1f1f1f;
      border-radius: 12px;
      padding: 8px 14px;
      color: #111;
      font-weight: 800;
      font-size: 15px;
      line-height: 1.3;
      text-align: center;
      letter-spacing: -0.03px;
    }

    .profile-info {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 86px;
      color: #fff;
      z-index: 6;
    }
    .profile-info .name-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .profile-info .name {
      font-weight: 800;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: -0.075px;
    }
    .profile-info .age {
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.055px;
    }
    .profile-info .quote {
      margin-top: 4px;
      font-weight: 600;
      font-size: 18px;
      line-height: 1.45;
      letter-spacing: -0.045px;
    }

    .cta {
      background: var(--color-primary-500, #FF5E19);
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.045px;
      border: 0;
      border-radius: 8px;
      height: 50px;
      cursor: pointer;
      transition: transform 80ms ease, background 120ms ease;
    }
    .card-cta {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 18px;
      width: auto;
    }
    .cta:active { transform: scale(0.98); background: var(--color-primary-600, #E54400); }
    .cta.secondary {
      background: transparent;
      color: #7d848f;
      font-weight: 500;
      height: 36px;
    }

    /* ────────────────────────────────────────────────
       SCREEN 2 — Matching Success (1548-8576)
       ──────────────────────────────────────────────── */
    .match-screen { background: #fff; }
    .match-header {
      position: absolute;
      top: 52px;
      left: 0; right: 0;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }
    .avatar-sm {
      width: 39px; height: 39px;
      border-radius: 50%;
      border: 1.3px solid #7d848f;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }
    .match-header .name {
      font-weight: 700;
      font-size: 19px;
      letter-spacing: -0.05px;
      color: #1a1a1a;
    }
    .match-photo {
      position: absolute;
      top: 110px;
      left: 20px;
      right: 20px;
      bottom: 152px;
      border-radius: 20px;
      overflow: hidden;
      background-color: #111;
      background-position: center top;
      background-size: cover;
    }
    .match-overlay {
      position: absolute;
      left: 50%;
      bottom: 192px;
      transform: translateX(-50%);
      width: 286px;
      padding: 22px 24px;
      background: rgba(0,0,0,0.62);
      border-radius: 12px;
      text-align: center;
      color: #fff;
      backdrop-filter: blur(4px);
      z-index: 5;
    }
    .match-overlay .check {
      width: 30px; height: 30px;
      margin: 0 auto 6px;
      border-radius: 50%;
      border: 2px solid #FF5E19;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .match-overlay .check svg { stroke: #FF5E19; }
    .match-overlay .title {
      color: var(--color-primary-500, #FF5E19);
      font-weight: 800;
      font-size: 26px;
      letter-spacing: -0.56px;
      line-height: 1.25;
      margin: 4px 0 6px;
      text-shadow: 0 4px 4px rgba(0,0,0,0.25);
    }
    .match-overlay .body {
      font-weight: 500;
      font-size: 16px;
      line-height: 1.45;
      letter-spacing: -0.04px;
      color: #fff;
      text-shadow: 0 4px 4px rgba(0,0,0,0.25);
    }

    .match-cta-stack {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 38px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    .match-cta-stack .cta {
      position: static;
      width: 100%;
    }

    /* ────────────────────────────────────────────────
       SCREEN 4 — Story intro (2574-2296)
       ──────────────────────────────────────────────── */
    .story-screen { background: #fafafa; }
    .story-top {
      position: absolute;
      top: 46px;
      left: 0; right: 0;
      height: 56px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      z-index: 10;
    }
    .story-top .left,
    .story-top .right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .icon-btn {
      width: 32px; height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 0;
      cursor: pointer;
      color: #1a1a1a;
    }
    .story-top .avatar-ring {
      position: relative;
      width: 40px; height: 40px;
      border-radius: 50%;
      padding: 2px;
      background: conic-gradient(from 220deg, #FF3419 0%, #FF5E19 60%, #FFCB97 100%);
    }
    .story-top .avatar-ring img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
      border: 2px solid #fff;
    }
    .story-top .name-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      line-height: 1.1;
    }
    .story-top .name-block .name {
      font-weight: 700;
      font-size: 15px;
      color: #1a1a1a;
      letter-spacing: -0.04px;
    }
    .story-top .name-block .meta {
      font-size: 12px;
      color: #1a1a1a;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .story-top .name-block .heart { font-size: 12px; }
    .story-body {
      position: absolute;
      top: 102px;
      left: 0; right: 0;
      bottom: 185px;
      background: #fafafa;
    }
    .story-bottom {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 185px;
      background: #fff;
      border-top: 1px solid #efefef;
      padding: 8px;
    }
    .story-banner {
      position: relative;
      width: 100%;
      height: 119px;
      border-radius: 12px;
      overflow: hidden;
      background-position: center;
      background-size: cover;
    }
    .story-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.32);
      pointer-events: none;
    }
    .story-banner-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 20px;
    }
    .story-banner-content .title {
      color: #fff;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.045px;
      text-align: center;
      line-height: 1.4;
      text-shadow: 0 4px 6px rgba(0,0,0,0.4);
    }
    .story-banner-content .subtitle {
      color: #fff;
      font-weight: 500;
      font-size: 12.5px;
      letter-spacing: -0.03px;
      text-align: center;
      line-height: 1.4;
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    }
    .story-banner-cta {
      width: 100%;
      max-width: 220px;
      height: 36px;
      background: rgba(255,94,25,0.4);
      border: 1px solid #FF5E19;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.0375px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      backdrop-filter: blur(4px);
      transition: background 120ms ease;
    }
    .story-banner-cta:active {
      background: rgba(255,94,25,0.7);
    }
    .story-banner-cta svg { stroke: #fff; }

    /* ────────────────────────────────────────────────
       SCREEN 3 — Date / Characters grid (1437-8055)
       ──────────────────────────────────────────────── */
    .date-screen { background: #fff; }
    .tabs {
      position: absolute;
      top: 102px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      border-bottom: 1px solid transparent;
      z-index: 10;
    }
    .tab {
      flex: 1;
      padding: 8px 0 10px;
      text-align: center;
      font-weight: 500;
      font-size: 16px;
      color: #595959;
      letter-spacing: -0.04px;
      cursor: pointer;
      border: 0;
      background: none;
      font-family: inherit;
      position: relative;
    }
    .tab.active {
      color: var(--color-primary-500, #FF5E19);
      font-weight: 600;
    }
    .tab.active::after {
      content: '';
      position: absolute;
      left: 8%; right: 8%;
      bottom: -1px;
      height: 2px;
      background: var(--color-primary-500, #FF5E19);
      border-radius: 2px;
    }

    .grid {
      position: absolute;
      top: 152px;
      left: 0; right: 0;
      bottom: 78px;
      padding: 18px 18px 20px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: 14px;
      row-gap: 22px;
    }
    .tab-pane[hidden] { display: none; }

    /* 데이트 중 tab — chat list rows */
    .chat-list {
      position: absolute;
      top: 152px;
      left: 0; right: 0;
      bottom: 78px;
      overflow-y: auto;
    }
    .chat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      cursor: pointer;
      background: #fff;
      border: 0;
      width: 100%;
      font-family: inherit;
      text-align: left;
      transition: background 120ms ease;
    }
    .chat-row:active { background: #fafafa; }
    .chat-row.muted { opacity: 0.45; cursor: default; }
    .chat-row .row-avatar {
      flex-shrink: 0;
      width: 48px; height: 48px;
      border-radius: 50%;
      background-position: 50% 8%;
      background-size: 230% auto;
      background-repeat: no-repeat;
      background-color: #ddd;
    }
    .chat-row .row-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-row .row-name {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 15px;
      color: #1a1a1a;
      letter-spacing: -0.04px;
    }
    .chat-row .row-name .heart-count {
      font-size: 12px;
      color: #1a1a1a;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }
    .chat-row .row-msg {
      font-size: 13px;
      color: #8c8c8c;
      letter-spacing: -0.03px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-row .row-badge {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--color-primary-500, #FF5E19);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* 다시보기 tab — replay grid + VIP promo */
    .replay-pane {
      position: absolute;
      top: 152px;
      left: 0; right: 0;
      bottom: 78px;
      overflow-y: auto;
      padding: 14px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .replay-info {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12.5px;
      line-height: 1.45;
      color: #595959;
      letter-spacing: -0.03px;
    }
    .replay-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .replay-card {
      position: relative;
      aspect-ratio: 1.05 / 1;
      border-radius: 12px;
      overflow: hidden;
      background: #ddd;
      background-position: center;
      background-size: cover;
      cursor: pointer;
      border: 0;
      padding: 0;
    }
    .replay-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,0.55) 100%);
    }
    .replay-card .play-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .replay-card .play-icon svg { color: var(--color-primary-500, #FF5E19); }
    .replay-card .replay-name {
      position: absolute;
      bottom: 10px; left: 12px;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.04px;
      z-index: 2;
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    }
    .vip-promo {
      margin-top: auto;
      background: #f5f5f5;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .vip-promo .promo-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .vip-promo .promo-title {
      color: var(--color-primary-500, #FF5E19);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.035px;
    }
    .vip-promo .promo-sub {
      font-size: 12px;
      color: #595959;
      letter-spacing: -0.03px;
    }
    .vip-promo .promo-cta {
      flex-shrink: 0;
      background: var(--color-primary-500, #FF5E19);
      color: #fff;
      border: 0;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .char-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      cursor: pointer;
      background: none;
      border: 0;
      padding: 0;
      font-family: inherit;
    }

<script>
  /* ──────────────────────────────────────────────
     Rizz prototype — minimal state machine
     ────────────────────────────────────────────── */

  const screens = {
    home: document.getElementById('screen-home'),
    match: document.getElementById('screen-match'),
    date: document.getElementById('screen-date'),
    story: document.getElementById('screen-story'),
  };

  function showScreen(name) {
    Object.entries(screens).forEach(([k, el]) => {
      el.hidden = (k !== name);
    });
    if (name === 'home') resetDeck();
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove('show'), 2600);
  }

  /* ─── Bottom nav routing ─── */
  document.querySelectorAll('[data-go]').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.go;
      if (target === 'home') showScreen('home');
      else if (target === 'date') showScreen('date');
      else toast(target + ' 탭은 이번 프로토타입 범위 밖이에요');
    });
  });

  /* ─── Screen 1: TikTok-style vertical feed ───
     vertical scroll snaps between full-bleed cards.
     Each card has its own CTA → match success.
     ─────────────────────────────────────────────── */
  /* video pool — all 5 videos shuffled, one per card */
  const videoPool = [
    'assets/videos/v1.mp4',
    'assets/videos/v2.mp4',
    'assets/videos/v3.mp4',
    'assets/videos/v4.mp4',
    'assets/videos/v5.mp4',
  ];
  const shuffledVids = videoPool.slice().sort(() => Math.random() - 0.5);

  const cardData = [
    {
      poster: 'assets/figma_characters/kwon_mina_match.png',
      tags: ['💈 미용사', '💔 NTR', '⛓️ BDSM'],
      name: '권미나', age: 21,
      quote: '뭘 봐요? 할 말 없으면 좀 비키지?',
      showHint: true,
    },
    {
      poster: 'assets/figma_characters/kang_iahn.png',
      tags: ['💄 미용사', '💕 츤데레'],
      name: '강이안', age: 32,
      quote: '저희 미용실 처음이시죠? 제가 머리 만져드릴게요~',
    },
    {
      poster: 'assets/figma_characters/girl_3.png',
      tags: ['🎀 비서', '💼 오피스'],
      name: '서지윤', age: 27,
      quote: '오늘 회의 자료 정리, 같이 도와주실래요?',
    },
    {
      poster: 'assets/figma_characters/hong_jian_avatar.png',
      tags: ['🌸 첫사랑', '💌 편지'],
      name: '홍지안', age: 24,
      quote: '오늘은 진짜 할 말이 있어요...',
    },
    {
      poster: 'assets/figma_characters/kwon_mina_profile.png',
      tags: ['🍷 와인바', '🎵 라운지'],
      name: '나유정', age: 29,
      quote: '오늘 한 잔 어때요? 같이 마실 사람이 필요해서요.',
    },
  ];

  const cards = cardData.map((c, i) => ({ ...c, video: shuffledVids[i] }));

  const stack = document.getElementById('swipe-stack');
  let activeCardIndex = 0;
  let matchedFromCard = false;

  function buildCardEl(card, idx) {
    const el = document.createElement('div');
    el.className = 'swipe-card';
    el.dataset.cardIndex = idx;
    el.innerHTML = `
      <video class="card-video" src="${card.video}" poster="${card.poster || ''}" autoplay muted loop playsinline preload="auto"></video>
      <div class="card-shade"></div>
      <div class="tag-row">
        ${card.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      ${card.showHint ? `
        <div class="swipe-hint">
          <img class="hand-pointer" src="assets/figma_characters/kwon_mina_swipe.png" alt="" />
          <span class="swipe-msg">화면을<br/>위로 밀어보세요</span>
        </div>` : ''}
      <div class="profile-info">
        <div class="name-row">
          <span class="name">${card.name}</span>
          <span class="age">${card.age}</span>
        </div>
        <div class="quote">${card.quote}</div>
      </div>
      <button class="cta card-cta" data-card-cta="${idx}">만나러 가기</button>
    `;
    return el;
  }

  function renderDeck() {
    stack.innerHTML = '';
    cards.forEach((c, i) => stack.appendChild(buildCardEl(c, i)));
    stack.scrollTop = 0;
    activeCardIndex = 0;
    hideHintOnScroll();
    setupVideoVisibilityControl();
  }

  /* Pause off-screen videos to save battery & bandwidth */
  function setupVideoVisibilityControl() {
    if (!('IntersectionObserver' in window)) return;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target.querySelector('.card-video');
        if (!video) return;
        if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
          video.play().catch(() => {});
        } else {
          video.pause();
        }
      });
    }, { root: stack, threshold: [0, 0.5, 1] });
    stack.querySelectorAll('.swipe-card').forEach(card => observer.observe(card));
  }

  function resetDeck() {
    renderDeck();
  }

  /* hide swipe hint on first scroll (after 1st advance) */
  function hideHintOnScroll() {
    let hintHidden = false;
    stack.addEventListener('scroll', () => {
      const card = stack.children[Math.round(stack.scrollTop / stack.clientHeight)];
      if (card) activeCardIndex = +card.dataset.cardIndex || 0;
      if (!hintHidden && stack.scrollTop > 40) {
        hintHidden = true;
        const hint = stack.querySelector('.swipe-hint');
        if (hint) hint.style.transition = 'opacity 280ms ease';
        if (hint) hint.style.opacity = '0';
      }
    }, { passive: true });
  }

  /* CTA per-card (delegated) — "만나러 가기" → 바로 스토리 시작 화면 */
  stack.addEventListener('click', (e) => {
    const cta = e.target.closest('[data-card-cta]');
    if (!cta) return;
    showScreen('story');
  });

  /* Mouse-drag to scroll (desktop swipe gesture support) */
  let dragY = null;
  let dragStartScroll = 0;
  let dragMoved = 0;
  stack.addEventListener('pointerdown', (e) => {
    if (e.target.closest('[data-card-cta]')) return; // don't hijack CTA
    if (e.pointerType === 'touch') return; // native touch scroll
    dragY = e.clientY;
    dragStartScroll = stack.scrollTop;
    dragMoved = 0;
    stack.style.scrollSnapType = 'none'; // free-scroll while dragging
  });
  stack.addEventListener('pointermove', (e) => {
    if (dragY === null) return;
    const dy = e.clientY - dragY;
    dragMoved = Math.abs(dy);
    stack.scrollTop = dragStartScroll - dy;
  });
  function endDrag(e) {
    if (dragY === null) return;
    const dy = e.clientY - dragY;
    dragY = null;
    stack.style.scrollSnapType = 'y mandatory';
    // snap to nearest card
    const stepH = stack.clientHeight + 20; // card height + gap
    const targetIdx = Math.round((dragStartScroll - dy) / stepH);
    const clampedIdx = Math.max(0, Math.min(cards.length - 1, targetIdx));
    const targetEl = stack.children[clampedIdx];
    stack.scrollTo({ top: targetEl ? targetEl.offsetTop : clampedIdx * stepH, behavior: 'smooth' });
  }
  stack.addEventListener('pointerup', endDrag);
  stack.addEventListener('pointercancel', endDrag);
  stack.addEventListener('pointerleave', (e) => { if (dragY !== null) endDrag(e); });

  renderDeck();

  /* ─── Screen 2: Match success buttons ─── */
  document.getElementById('btn-chat-now').addEventListener('click', () => {
    toast('채팅 화면으로 이동 (프로토타입 범위 밖)');
  });
  /* ─── Screen 4: Story start handlers ─── */
  document.getElementById('btn-story-back').addEventListener('click', () => {
    showScreen('home');
  });
  document.getElementById('btn-story-start').addEventListener('click', () => {
    toast('스토리 시작 (프로토타입 범위 밖)');
  });

  document.getElementById('btn-browse-more').addEventListener('click', () => {
    // "더 둘러보기" → 메인 화면으로 복귀 (첫 카드부터)
    matchedFromCard = false;
    showScreen('home');
  });

  /* ─── Screen 3: characters grid ─── */
  const grid = document.getElementById('char-grid');
  const profileImg = 'assets/figma_characters/kwon_mina_profile.png';
  const items = [];
  for (let i = 0; i < 9; i++) items.push({ name: '권미나', state: 'active' });
  for (let i = 0; i < 3; i++) items.push({ name: '권미나', state: 'done' });

  items.forEach((item, idx) => {
    const card = document.createElement('button');
    card.className = 'char-card';
    card.innerHTML = `
      <div class="char-photo-wrap">
        <div class="char-photo ${item.state === 'done' ? 'done' : ''}" style="background-image:url('${profileImg}')">
          <span class="ring"></span>
        </div>
        <span class="status-badge ${item.state === 'done' ? 'done' : 'active'}">${item.state === 'done' ? '완료' : '진행 중'}</span>
      </div>
      <div class="char-name">${item.name}</div>
    `;
    card.addEventListener('click', () => {
      if (item.state === 'done') {
        toast('완료된 캐릭터예요. 다시보기 탭에서 확인해 주세요');
      } else {
        toast('진행 중인 대화방으로 이동 (프로토타입 범위 밖)');
      }
    });
    grid.appendChild(card);
  });

  /* ─── 데이트 중 (chat list) — rough placeholder data ─── */
  const ongoingPane = document.getElementById('pane-ongoing');
  const sampleAvatars = [
    'assets/figma_characters/hong_jian_avatar.png',
    'assets/figma_characters/kwon_mina_profile.png',
    'assets/figma_characters/kang_iahn.png',
    'assets/figma_characters/girl_3.png',
  ];
  const ongoingChars = [
    { name: '홍지안', heart: 0,  msg: '정말 죄송합니다 ㅠㅠㅠㅠ',         unread: 1 },
    { name: '정하윤', heart: 2,  msg: '제가 반나절 동안 안 가도요...?!',  unread: 1 },
    { name: '안예빈', heart: 1,  msg: '아무렇지도 않았어요...?',          unread: 1 },
    { name: '장아영', heart: 0,  msg: '문 여세요.',                        unread: 0 },
    { name: '최유연', heart: 0,  msg: '자리를 비움',                        unread: 0 },
    { name: '이나영', heart: 0,  msg: '빨리!',                              unread: 1 },
    { name: '나유정', heart: 10, msg: '엔딩을 완료했어요.',                muted: true },
  ];
  ongoingChars.forEach((c, i) => {
    const row = document.createElement('button');
    row.className = 'chat-row' + (c.muted ? ' muted' : '');
    const avatar = sampleAvatars[i % sampleAvatars.length];
    row.innerHTML = `
      <div class="row-avatar" style="background-image:url('${avatar}')"></div>
      <div class="row-text">
        <div class="row-name">
          <span>${c.name}</span>
          <span class="heart-count">🧡 ${c.heart}</span>
        </div>
        <div class="row-msg">${c.msg}</div>
      </div>
      ${c.unread ? `<div class="row-badge">${c.unread}</div>` : ''}
    `;
    row.addEventListener('click', () => {
      if (c.muted) return;
      toast(c.name + ' 대화방으로 이동 (프로토타입 범위 밖)');
    });
    ongoingPane.appendChild(row);
  });

  /* ─── 다시보기 (replay grid + VIP promo) — rough placeholder ─── */
  const replayPane = document.getElementById('pane-replay');
  const replayChars = [
    { name: '이수아', img: 'assets/figma_characters/kwon_mina_match.png' },
    { name: '김지유', img: 'assets/figma_characters/kang_iahn.png' },
    { name: '김진혁', img: 'assets/figma_characters/girl_3.png' },
    { name: '하도연', img: 'assets/figma_characters/hong_jian_avatar.png' },
  ];
  replayPane.innerHTML = `
    <div class="replay-info">
      최근 2주간 완료한 엔딩을 다시볼 수 있습니다.<br/>
      2주가 지난 엔딩은 VIP 멤버십으로 이용 가능합니다.
    </div>
    <div class="replay-grid">
      ${replayChars.map(c => `
        <button class="replay-card" data-name="${c.name}" style="background-image:url('${c.img}')">
          <span class="play-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </span>
          <span class="replay-name">${c.name}</span>
        </button>
      `).join('')}
    </div>
    <div class="vip-promo">
      <div class="promo-text">
        <span class="promo-title">리즈 VIP 멤버십</span>
        <span class="promo-sub">다시보기 무제한, 보석 150개 적립</span>
      </div>
      <button class="promo-cta">혜택 보기</button>
    </div>
  `;
  replayPane.addEventListener('click', (e) => {
    const card = e.target.closest('.replay-card');
    if (card) {
      toast(card.dataset.name + ' 다시보기 재생 (프로토타입 범위 밖)');
      return;
    }
    if (e.target.classList.contains('promo-cta')) {
      toast('VIP 멤버십 페이지로 이동 (프로토타입 범위 밖)');
    }
  });

  /* ─── Tabs — switch panes ─── */
  const panes = {
    ongoing:  document.getElementById('pane-ongoing'),
    profiles: document.getElementById('char-grid'),
    replay:   document.getElementById('pane-replay'),
  };
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const target = t.dataset.tab;
      Object.entries(panes).forEach(([k, el]) => { el.hidden = (k !== target); });
    });
  });
</script>
</body>
</html>
